name: Feature request
description: Suggest a useful Tradar improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What builder workflow or project-signal problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Tradar do differently?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source connector
        - Evidence normalization
        - Analyst report quality
        - HTML rendering
        - CLI onboarding
        - Privacy and redaction
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed private local paths, raw agent traces, secrets, and unredacted report content.
          required: true
